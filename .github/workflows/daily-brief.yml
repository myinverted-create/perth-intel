name: Daily WA Commercial Construction Brief
on:
  schedule:
    - cron: "0 22 * * 0-4"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install xai-sdk
      - name: Fetch Grok brief
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4-latest' }}
        run: python scripts/fetch_brief.py
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily brief $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi